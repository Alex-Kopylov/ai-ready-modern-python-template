[tools]
python = "3.14.6"
uv = "latest"
node = "22.22.0"
"npm:jscpd" = "4.2.4"
"npm:markdownlint-cli2" = "0.22.1"
"aqua:01mf02/jaq" = "2.3.0"
"aqua:gitleaks/gitleaks" = "8.30.1"
"aqua:hadolint/hadolint" = "2.14.0"
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:rhysd/actionlint" = "1.7.11"
"aqua:tamasfe/taplo" = "0.10.0"
"aqua:zizmorcore/zizmor" = "1.25.2"
"aqua:crate-ci/typos" = "1.20.7"

# Python tools managed via uv (installed in venv)
# Accessible via `uv run <tool>` after `uv sync`
[tasks.ruff-format]
description = "Format Python code with ruff"
run = "uv run ruff format --force-exclude"

[tasks.ruff-check]
description = "Lint Python code with ruff"
run = "uv run ruff check --fix --force-exclude"

[tasks.flake8]
description = "Run flake8 async checks"
run = "uv run flake8"

[tasks.ty-check]
description = "Type check Python code with ty"
run = "uv run ty check"

[tasks.yamllint]
description = "Lint YAML files"
run = "uv run yamllint -c .yamllint"

[tasks.check-jsonschema]
description = "Validate JSON schemas"
run = "uv run check-jsonschema"

[tasks.install]
description = "Install Python project dependencies"
run = "uv sync --all-extras"

[tasks.lint]
description = "Run the full lint suite"
run = [
  { tasks = ["lint-full"] },
]

[tasks.lint-fast]
description = "Run fast, edit-safe linters"
run = [
  { tasks = [
    "lint-python-fast",
    "lint-dockerfile",
    "lint-md",
    "lint-yml",
    "lint-json",
    "lint-toml",
    "lint-sh",
    "lint-github-actions",
    "lint-typos",
  ] },
]

[tasks.lint-full]
description = "Run fast linters plus whole-project gate checks"
run = [
  { tasks = [
    "lint-fast",
    "lint-python-deep",
    "lint-deps",
    "lint-duplicates",
    "lint-secrets",
    "lint-audit",
    "lint-gha-security",
  ] },
]

[tasks.lint-python]
description = "Run all Python lint checks"
run = [
  { tasks = [
    "lint-python-fast",
    "lint-python-deep",
  ] },
]

[tasks.lint-python-fast]
description = "Run fast Python checks"
run = "./scripts/mise/lint-python-fast.sh"

[tasks.lint-python-deep]
description = "Run whole-project Python analysis"
run = "./scripts/mise/lint-python-deep.sh"

[tasks.lint-dockerfile]
description = "Lint Dockerfiles with Hadolint"
run = "./scripts/mise/lint-dockerfile.sh"

[tasks.lint-md]
description = "Lint Markdown files"
run = "mise exec -- markdownlint-cli2"

[tasks.lint-yml]
description = "Lint YAML files"
run = "uv run yamllint -c .yamllint ."

[tasks.lint-json]
description = "Validate JSON syntax with jaq"
run = "./scripts/mise/lint-json.sh"

[tasks.lint-toml]
description = "Lint TOML files with Taplo"
run = "./scripts/mise/lint-toml.sh"

[tasks.lint-sh]
description = "Lint shell scripts with ShellCheck"
run = "./scripts/mise/lint-sh.sh"

[tasks.lint-github-actions]
description = "Lint GitHub Actions workflow files"
run = "./scripts/mise/lint-github-actions.sh"

[tasks.lint-duplicates]
description = "Detect duplicated code"
run = "mise exec -- jscpd --config .jscpd.json --threshold 5"

[tasks.lint-deps]
description = "Check Python dependency declarations"
run = "uv run deptry ."

[tasks.lint-secrets]
description = "Scan git history for leaked secrets"
run = "mise exec -- gitleaks git --redact --no-banner"

[tasks.lint-gha-security]
description = "Scan GitHub Actions workflows for security issues"
run = "./scripts/mise/lint-gha-security.sh"

[tasks.lint-audit]
description = "Scan Python dependencies for known CVEs"
run = "uv audit"

[tasks.lint-typos]
description = "Scan for spelling mistakes"
run = "mise exec -- typos"

[tasks.test]
description = "Run product tests when present"
run = "./scripts/mise/test.sh"

[tasks.test-cov]
description = "Run product tests with a coverage report when present"
run = "./scripts/mise/test.sh --coverage"

[tasks.format]
description = "Format and autofix Python code"
run = "./scripts/mise/format-python.sh"

[tasks.install-hooks]
description = "Install prek-managed pre-commit and pre-push hooks"
run = "uv run prek install --hook-type pre-commit --hook-type pre-push"

[tasks.clean]
description = "Remove local build and test cache directories"
run = [
  "find . -type d -name __pycache__ -exec rm -rf {} +",
  "find . -type d -name .pytest_cache -exec rm -rf {} +",
  "rm -rf dist build *.egg-info",
]
